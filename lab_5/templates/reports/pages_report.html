{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h1 class="mt-5">Статистика посещений по страницам</h1>
        
        <div class="mb-3">
            <a href="{{ url_for('reports.logs') }}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Назад к журналу
            </a>
            <a href="{{ url_for('reports.export_pages_csv') }}" class="btn btn-success">
                <i class="bi bi-download"></i> Экспорт в CSV
            </a>
        </div>
        
        <div class="table-responsive mt-4">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>№</th>
                        <th>Страница</th>
                        <th>Количество посещений</th>
                    </tr>
                </thead>
                <tbody>
                    {% for path, count in stats %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td><code>{{ path }}</code></td>
                        <td>
                            <span class="badge bg-primary">{{ count }}</span>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center">Нет данных о посещениях</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
